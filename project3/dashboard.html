<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Finance Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="navbar">
  <h2>💸 Finance AI</h2>
  <div>
    <span id="userName"></span>
    <span class="profile-icon" onclick="goProfile()" title="Go to Profile">👤</span>
  </div>
</div>

<div class="grid">

  <!-- Summary Cards -->
  <div class="card">
    <strong>Total Spending</strong><br>
    ₹<span id="total">0</span>
  </div>
  <div class="card">
    <strong>Total Entries</strong><br>
    <span id="count">0</span>
  </div>

  <!-- Add Expense Form -->
  <div class="card full">
    <h3>➕ Add New Expense</h3>
    <input id="amount" type="number" placeholder="Amount (e.g., 500)" step="0.01" min="0">
    <input id="category" placeholder="Category (e.g., Food, Transport, Shopping)">
    <textarea id="note" placeholder="Add a note (optional) - e.g., lunch at restaurant"></textarea>
    <button onclick="addExpense()">✅ Add Expense</button>
  </div>

  <!-- Transactions List-->
  <div class="card full">
    <h3>📋 Recent Transactions</h3>
    <ul id="list">
      <li style="opacity: 0.6; padding: 20px; text-align: center;">No expenses yet. Add one to get started! 👆</li>
    </ul>
  </div>

  <!-- Spending Chart---->
  <div class="card full">
    <h3>📊 Spending Distribution</h3>
    <canvas id="chart"></canvas>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
