<!DOCTYPE html>
<html>
<head>
  <title>Profile - Finance Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body class="center">

<div class="card profile-card">

  <h2>👤 Your Profile</h2>
  <p style="opacity:0.7; margin-bottom: 20px;">Manage your personal details and financial information</p>

  <!-- Display Section -->
  <div id="profileDisplay">
    <p><strong>Name:</strong> <span id="d_name">-</span></p>
    <p><strong>Age:</strong> <span id="d_age">-</span></p>
    <p><strong>Profession:</strong> <span id="d_profession">-</span></p>
    <p><strong>Monthly Income:</strong> ₹<span id="d_income">-</span></p>
  </div>

  <hr>


  <h3>Edit Profile</h3>

  <input id="name" placeholder="Full Name" type="text">
  <input id="age" type="number" placeholder="Age" min="18" max="120">
  <input id="profession" placeholder="Profession (e.g., Engineer, Student)" type="text">
  <input id="income" type="number" placeholder="Monthly Income" step="0.01" min="0">

  <br>

  <button onclick="saveProfile()">💾 Save Profile</button>
  <button onclick="goDashboard()">↩️ Back to Dashboard</button>
  <button onclick="logout()" style="background: linear-gradient(45deg, #ff6b6b, #ee5a6f);">🚪 Logout</button>

</div>

<script src="script.js"></script>
</body>
</html>
