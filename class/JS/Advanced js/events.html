<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Events Demo</title>

    <style>
        body {
            background-color: #414141;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 15px;
        }

        img {
            width: 200px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.05);
        }

        a {
            color: lightblue;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h2>Amazing Images (Click to Remove)</h2>

    <ul id="images">
        <li >
            <img id="photoshop"
                src="https://upload.wikimedia.org/wikipedia/commons/a/af/Adobe_Photoshop_CC_icon.svg"
                alt="Photoshop Logo">
        </li>

        <li>
            <img id="japan" 
                src="https://images.unsplash.com/photo-1501785888041-af3ef285b470"
                alt="Mount Fuji">
        </li>

        <li>
            <img id="Nature"
                src="https://images.unsplash.com/photo-1549880338-65ddcdfd017b"
                alt="Nature Image">
        </li>

        <li>
            <img id="photoman"
                src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
                alt="Photographer">
        </li>

        <li>
            <img id="tiger"
                src="https://images.unsplash.com/photo-1546182990-dffeafbe841d"
                alt="Tiger">
        </li>

        <li>
            <a href="https://google.com" id="google">Visit Google</a>
        </li>
    </ul>
  </body>
  <script>
    document.getElementById("japan").onclick=function() {
      alert("hii");
    }
    document.getElementById("Nature").onclick=function() {
      alert("nature image clicked");
    }

    document.getElementById("tiger").addEventListener("click",function(e){
        console.log(e);
    })

    //assignment j query usecases ,type,timestamp,defaultPrevented,target ,sourse event ,currentTarget,clientX,clientY,screenX,screenY,alt key ,cntrl key,shift key
    // addevent listener is a js listener which is used to atach an event handler to the html elements so that specific funtion run when event occures.
    document.getElementById("photoman").addEventListener("click",function(){
        console.log("clicked on photoman");
    },true)
    document.getElementById("images").addEventListener("click",function(){
        console.log("clicked on ul");
    },true)
    
    //event propagation -event bubbling
    // when inner element in parant and parant to the document is photoshop event , is photoshop event is clicked then clicked on ul, when event capturing is true then order becomes parant to child 
    document.getElementById("google").addEventListener("click",function(e){
        console.log("google clicked");
        e.preventDefault();
        
    })
    // activity - when clicked on image then that image get removed from the dom in console "get removed image"
  </script>
  </html>
